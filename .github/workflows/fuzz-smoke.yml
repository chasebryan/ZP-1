name: Fuzz Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"

jobs:
  fuzz-smoke:
    name: Fuzz smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Run fuzz smoke
        run: ZP1_FUZZ_SECONDS=30 ./scripts/run-fuzz-smoke.sh
